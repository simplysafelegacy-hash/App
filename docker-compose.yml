# Simply Safe Legacy — local stack.
#
#   docker compose up --build
#
# For production deployment, this file is layered with docker-compose.prod.yml
# (added by the deploy script) which adds Caddy and removes direct port
# exposures so only Caddy reaches the internet.
#
# Services:
#   postgres  → the vault's database
#   backend   → Go monolith (see backend/Dockerfile)
#   frontend  → Vite build served by nginx, proxies /api → backend

name: simplysafelegacy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simplysafelegacy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simplysafelegacy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-simplysafelegacy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simplysafelegacy} -d ${POSTGRES_DB:-simplysafelegacy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-simplysafelegacy}:${POSTGRES_PASSWORD:-simplysafelegacy_dev_password}@postgres:5432/${POSTGRES_DB:-simplysafelegacy}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-of-at-least-32-chars}
      JWT_EXPIRY: ${JWT_EXPIRY:-168h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:5173}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_INDIVIDUAL: ${STRIPE_PRICE_INDIVIDUAL}
      STRIPE_PRICE_FAMILY: ${STRIPE_PRICE_FAMILY}
      STRIPE_PRICE_SAFEKEEPING: ${STRIPE_PRICE_SAFEKEEPING}
      STRIPE_TRIAL_DAYS: ${STRIPE_TRIAL_DAYS:-14}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_DEMO_MODE: "false"
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"

volumes:
  pgdata:
