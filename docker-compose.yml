# Sealed — full local stack.
#
#   docker compose up --build
#
# Services:
#   postgres  → the vault's database
#   minio     → S3-compatible object store for document files
#   backend   → Go monolith (see backend/Dockerfile)
#   frontend  → Vite build served by nginx, proxies /api → backend

name: sealed

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sealed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sealed_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sealed}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sealed} -d ${POSTGRES_DB:-sealed}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sealed_dev}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sealed_dev_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-sealed}:${POSTGRES_PASSWORD:-sealed_dev_password}@postgres:5432/${POSTGRES_DB:-sealed}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-of-at-least-32-chars}
      JWT_EXPIRY: ${JWT_EXPIRY:-168h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      S3_BUCKET: ${S3_BUCKET:-sealed-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-sealed_dev}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-sealed_dev_password}
      S3_USE_PATH_STYLE: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_DEMO_MODE: "false"
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"

volumes:
  pgdata:
  miniodata:
